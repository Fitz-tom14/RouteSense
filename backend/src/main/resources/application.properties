server.port=8080

app.cors.allowedOrigins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176

# OpenRouteService API key - get a free key at https://openrouteservice.org/dev/#/signup
# Leave blank to fall back to haversine x 1.25 car distance estimate
app.openrouteservice.api.key=

# ── Database ────────────────────────────────────────────────────────────────
# Default: H2 file-based database (no installation required, data persists).
# To switch to PostgreSQL: comment out the H2 block and uncomment PostgreSQL.

# H2 (default - works out of the box)
spring.datasource.url=jdbc:h2:file:./data/routesense
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL (uncomment to use instead of H2)
# spring.datasource.url=jdbc:postgresql://localhost:5432/routesense
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
